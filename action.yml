name: 'DevOps Maturity Action'
description: >
  Automatically runs the devops-maturity CLI against a devops-maturity.yml file,
  updates the README badge, and opens a pull request for review.
author: 'devops-maturity'

branding:
  icon: 'award'
  color: 'green'

inputs:
  github-token:
    description: >
      GitHub token used to create the pull request.
      Pass secrets.GITHUB_TOKEN or a PAT from your workflow.
    required: true

  file:
    description: >
      Path to the devops-maturity.yml assessment file, relative to the
      repository root.
    required: false
    default: 'devops-maturity.yml'

  readme-path:
    description: >
      Path to the README file that will be updated with the new badge,
      relative to the repository root.
    required: false
    default: 'README.md'

  pr-branch:
    description: >
      Name of the branch that will be created (or updated) for the pull
      request.
    required: false
    default: 'chore/update-devops-maturity-badges'

  commit-message:
    description: 'Commit message used when committing the badge update.'
    required: false
    default: 'chore: update devops-maturity badges'

  pr-title:
    description: 'Title of the pull request.'
    required: false
    default: 'chore: update devops-maturity badges'

  pr-body:
    description: 'Body text of the pull request.'
    required: false
    default: >
      Automated badge update generated by the
      [devops-maturity-action](https://github.com/devops-maturity/devops-maturity-action)
      based on changes to `devops-maturity.yml`.

outputs:
  score:
    description: 'Overall DevOps maturity score as a percentage (e.g. "72.3%").'
    value: ${{ steps.assessment.outputs.score }}

  level:
    description: 'Maturity level: WIP, PASSING, BRONZE, SILVER, or GOLD.'
    value: ${{ steps.assessment.outputs.level }}

  badge-url:
    description: 'shields.io badge URL corresponding to the maturity level.'
    value: ${{ steps.assessment.outputs.badge_url }}

  badge-markdown:
    description: 'Ready-to-paste Markdown snippet for the badge.'
    value: ${{ steps.assessment.outputs.badge_markdown }}

  pull-request-number:
    description: 'Number of the created (or updated) pull request.'
    value: ${{ steps.create-pr.outputs.pull-request-number }}

  pull-request-url:
    description: 'HTML URL of the created (or updated) pull request.'
    value: ${{ steps.create-pr.outputs.pull-request-url }}

runs:
  using: 'composite'
  steps:
    # ── 1. Python + devops-maturity CLI ──────────────────────────────────────
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install devops-maturity CLI
      shell: bash
      run: pip install --quiet devops-maturity

    # ── 2. Run the assessment ─────────────────────────────────────────────────
    - name: Run devops-maturity assessment
      id: assessment
      shell: bash
      run: |
        OUTPUT=$(dm config --file "${{ inputs.file }}" 2>&1)
        echo "$OUTPUT"

        SCORE=$(echo "$OUTPUT"     | awk '/Your score: / {print $NF}')
        LEVEL=$(echo "$OUTPUT"     | awk '/Your maturity level: / {print $NF}')
        BADGE_URL=$(echo "$OUTPUT" | awk '/Badge URL: / {print $NF}')
        # Prefer the CLI-provided Markdown badge; fall back to constructing it
        BADGE_MD=$(echo "$OUTPUT"  | sed -n 's/^Markdown badge: //p')
        if [ -z "$BADGE_MD" ] && [ -n "$BADGE_URL" ]; then
          BADGE_MD="[![DevOps Maturity](${BADGE_URL})](https://devops-maturity.github.io/)"
        fi

        if [ -z "$LEVEL" ] || [ -z "$BADGE_URL" ]; then
          echo "ERROR: could not parse assessment output"
          exit 1
        fi

        echo "score=${SCORE}"              >> "$GITHUB_OUTPUT"
        echo "level=${LEVEL}"              >> "$GITHUB_OUTPUT"
        echo "badge_url=${BADGE_URL}"      >> "$GITHUB_OUTPUT"
        echo "badge_markdown=${BADGE_MD}"  >> "$GITHUB_OUTPUT"

    # ── 3. Update README badge ────────────────────────────────────────────────
    - name: Update README badge
      shell: python
      env:
        BADGE_URL: ${{ steps.assessment.outputs.badge_url }}
        BADGE_LEVEL: ${{ steps.assessment.outputs.level }}
        README_PATH: ${{ inputs.readme-path }}
      run: |
        import os
        import re
        import sys

        badge_url   = os.environ["BADGE_URL"]
        badge_level = os.environ["BADGE_LEVEL"]
        readme_path = os.environ["README_PATH"]

        if not os.path.isfile(readme_path):
            print(f"README not found at '{readme_path}' — skipping badge update.")
            sys.exit(0)

        badge_md = (
            f"[![DevOps Maturity]({badge_url})]"
            "(https://devops-maturity.github.io/)"
        )

        with open(readme_path, encoding="utf-8") as fh:
            content = fh.read()

        # Match any existing DevOps Maturity shields.io badge link
        pattern = (
            r"\[!\[DevOps Maturity[^\]]*\]"
            r"\(https://img\.shields\.io/badge/DevOps[^\)]*\)\]"
            r"\([^\)]*devops-maturity[^\)]*\)"
        )

        if re.search(pattern, content):
            new_content = re.sub(pattern, badge_md, content)
        else:
            # Prepend the badge before the first heading (or at the top)
            heading_match = re.search(r"^#", content, re.MULTILINE)
            if heading_match:
                pos = heading_match.start()
                new_content = content[:pos] + badge_md + "\n\n" + content[pos:]
            else:
                new_content = badge_md + "\n\n" + content

        if new_content == content:
            print("Badge is already up to date — no changes written.")
        else:
            with open(readme_path, "w", encoding="utf-8") as fh:
                fh.write(new_content)
            print(f"Updated '{readme_path}' with badge for level: {badge_level}")

    # ── 4. Open a pull request ────────────────────────────────────────────────
    - name: Create pull request
      id: create-pr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ inputs.github-token }}
        commit-message: ${{ inputs.commit-message }}
        branch: ${{ inputs.pr-branch }}
        title: ${{ inputs.pr-title }}
        body: ${{ inputs.pr-body }}
        labels: devops-maturity
